<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Proxy Manager</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="toast-container"></div>
  <div id="fixed-header">
    <div id="ip-status-container">
      <div style="display: flex; align-items: center; gap: 6px;">
        <span id="ip-text">My IP: Fetching...</span>
        <button id="refresh-ip-btn" title="Refresh IP">↺</button>
      </div>
      <div style="display: flex; align-items: center; gap: 4px;" title="AdGuard DNS">
        <span style="font-size: 11px; text-transform: uppercase; font-weight: 600; color: var(--text-muted);">AdGuard DNS</span>
        <label class="switch">
          <input type="checkbox" id="adblockToggle">
          <span class="slider"></span>
        </label>
      </div>
    </div>
    <div class="top-bar">
      <button id="settingsBtn" title="Settings">⚙️</button>
      <button id="toggleFormBtn">Add New Proxy</button>
      <button id="themeToggleBtn" title="Toggle Theme">🌙</button>
    </div>
    <div id="addProxyFormContainer" style="display: none; margin-bottom: 15px;">
      <h2>Add Proxy</h2>
      <form id="add-proxy-form">
        <div class="segmented-control" id="proxy-type-selector">
          <button type="button" class="segment-btn active" data-type="HTTP">HTTP</button>
          <button type="button" class="segment-btn" data-type="HTTPS">HTTPS</button>
          <button type="button" class="segment-btn" data-type="SOCKS5">SOCKS5</button>
        </div>
        <input type="text" id="name" placeholder="Custom Name" required>
        <input type="text" id="host" placeholder="IP/Host" required>
        <input type="number" id="port" placeholder="Port" required>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button type="submit">Add Proxy</button>
      </form>
    </div>

    <h2>Saved Proxies</h2>
  </div>

  <div id="proxy-list" class="proxy-list scrollable-area"></div>

  <div id="fixed-footer" style="display: flex; align-items: center;">
    <span style="margin-right: 6px; font-size: 14px;">🌐</span>
    <span id="current-domain">Fetching site...</span>
    <button id="footerBindBtn" title="Bind Domain to Proxy" class="btn-icon" style="margin-left:auto; display:none; padding:2px;">🔗</button>
  </div>

  <div id="overlay"></div>

  <div id="settings-menu" class="bottom-sheet">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
      <h2 style="margin: 0;">Settings</h2>
    </div>
    
    <div class="menu-item" id="openBulkImportBtn" style="margin-bottom: 12px;">📥 Bulk Import</div>
    <div class="menu-item" id="openPoolModalBtn" style="margin-bottom: 8px;">🗃️ Manage Proxy Pool</div>
  </div>

  <div id="pool-modal" class="modal">
    <div class="modal-header">
      <h2>Proxy Pool</h2>
      <button id="closePoolModalBtn" class="btn-close">✖</button>
    </div>
    <input type="text" id="pool-search" placeholder="Search by name or IP..." style="flex-shrink: 0; margin-bottom: 10px;">
    <div id="pool-list"></div>
  </div>

  <div id="bulk-import-modal" class="modal">
    <div class="modal-header">
      <h2>Bulk Import Proxies</h2>
      <button id="closeBulkImportModalBtn" class="btn-close">✖</button>
    </div>
    <form id="bulk-import-form" style="flex-grow: 1; display: flex; flex-direction: column;">
      <textarea id="bulk-proxies-input" placeholder="ip:port:user:pass (one per line)" required style="flex-grow: 1; margin-bottom: 10px;"></textarea>
      <button type="submit">Confirm Import</button>
    </form>
  </div>

  <script src="popup.js"></script>
</body>
</html>
